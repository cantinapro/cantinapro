<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CantinaPro — Bar Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#1a1a24;--s3:#222234;
  --border:#2a2a3a;--gold:#f5a623;--amber:#e8820c;
  --red:#ff4455;--green:#00e87a;--blue:#4488ff;--purple:#a855f7;--teal:#00d4aa;
  --text:#e8e8f0;--muted:#6b6b80;--lc:#c8102e;--lcg:#d4a017;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.auth-logo{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:8px;color:var(--lc);line-height:1;}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--lcg);margin-top:4px;}
.auth-div{width:60px;height:2px;background:linear-gradient(90deg,var(--lc),var(--lcg));margin:24px auto;}
.auth-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:360px;}
.auth-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;color:var(--text);margin-bottom:20px;}
.auth-tabs{display:flex;background:var(--s2);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.auth-tab.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.field input{background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;width:100%;}
.field input:focus{border-color:var(--lc);}
.auth-btn{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;cursor:pointer;transition:all .2s;margin-top:4px;}
.auth-btn:hover{filter:brightness(1.1);}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;}
.auth-err{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);border-radius:6px;padding:10px;font-size:13px;color:var(--red);margin-bottom:12px;}
.auth-note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6;}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.hdr-logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;color:var(--lc);}
.hdr-bar{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--lcg);letter-spacing:1px;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:10px;}
.lang-wrap{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.lb{background:none;border:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;padding:4px 8px;cursor:pointer;}
.lb.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:1px;padding:4px 8px;border-radius:4px;cursor:pointer;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bot-nav{background:var(--s1);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;}
.nb{background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;flex:1;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;transition:all .2s;}
.nb.on{color:var(--lc);border-top-color:var(--lc);}
.ni{font-size:18px;line-height:1;}
.nl{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

/* MAIN */
.main{flex:1;padding:14px;padding-bottom:74px;}
.tab-content{display:none;}
.tab-content.on{display:block;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.ct{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.lc::before{background:linear-gradient(90deg,var(--lc),var(--lcg));}
.kpi.g::before{background:var(--green);}
.kpi.r::before{background:var(--red);}
.kpi.b::before{background:var(--blue);}
.kl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.kv{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;line-height:1;}
.kpi.lc .kv{color:var(--lc);}
.kpi.g .kv{color:var(--green);}
.kpi.r .kv{color:var(--red);}
.kpi.b .kv{color:var(--blue);}
.kd{font-size:11px;color:var(--muted);}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:8px;}
.action-btn.red{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.action-btn.green{background:linear-gradient(135deg,var(--green),#00a050);color:#000;}
.action-btn.blue{background:linear-gradient(135deg,var(--blue),#2266cc);color:#fff;}
.action-btn.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;}
.action-btn:disabled{opacity:.5;cursor:not-allowed;}

/* ROWS */
.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.mono{font-family:'Share Tech Mono',monospace;}

/* STAFF */
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.staff-pick{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .2s;position:relative;}
.staff-pick:hover{border-color:var(--lc);}
.staff-pick.on{background:rgba(200,16,46,.1);border-color:var(--lc);}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;}
.del-btn{position:absolute;top:6px;right:6px;background:rgba(255,68,85,.15);border:none;color:var(--red);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}

/* INVENTORY */
.inv-table{width:100%;border-collapse:collapse;}
.inv-table th{font-size:10px;letter-spacing:1px;color:var(--muted);padding:8px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;}
.inv-table td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.inv-table tr:last-child td{border-bottom:none;}
.stock-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.stock-ok{background:#0d3320;color:var(--green);}
.stock-low{background:#3d1800;color:#ff9040;}
.stock-out{background:#2d0008;color:var(--red);}

/* CHECKLIST */
.cprog{background:var(--s2);border-radius:4px;overflow:hidden;height:6px;margin-bottom:10px;}
.cbar{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.cgroup-t{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:14px;font-weight:700;}
.citem{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.citem:last-child{border-bottom:none;}
.cbox{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cbox.done{background:var(--green);border-color:var(--green);}
.ctxt{font-size:14px;font-weight:500;}
.ctxt.done{color:var(--muted);text-decoration:line-through;}
.subbtn{width:100%;padding:14px;border-radius:6px;border:none;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:14px;}
.subbtn.ready{background:var(--gold);color:#000;}
.subbtn.locked{background:var(--s2);color:var(--muted);cursor:not-allowed;border:1px solid var(--border);}

/* GALLERY */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pcard{border-radius:8px;overflow:hidden;border:1px solid var(--border);aspect-ratio:1;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;background:var(--s2);}
.pcard:hover{border-color:var(--lc);}
.pcard img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:8px;}
.photo-label{font-size:10px;color:#fff;font-weight:700;}
.photo-time{font-size:9px;color:rgba(255,255,255,.6);font-family:'Share Tech Mono',monospace;}
.upzone{border:2px dashed var(--border);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.upzone:hover{border-color:var(--lc);}

/* SPINNER */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--lc);border-radius:50%;animation:spin 1s linear infinite;margin:12px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{text-align:center;color:var(--muted);font-size:13px;padding:20px;}

/* PILLS */
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;}
.pill.in{background:rgba(0,232,122,.15);color:var(--green);}
.pill.out{background:rgba(107,107,128,.15);color:var(--muted);}
.success-box{background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.3);border-radius:8px;padding:16px;text-align:center;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--green);margin-bottom:12px;}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:360px;}
.modal-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions button{flex:1;padding:10px;border-radius:6px;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;border:none;cursor:pointer;}
.btn-cancel{background:var(--s3);color:var(--muted);}
.btn-save{background:var(--lc);color:#fff;}

/* SHIFT */
.briefing-hdr{padding:16px;border-radius:8px 8px 0 0;background:linear-gradient(135deg,#1a0008,#0a0a1a);margin-bottom:0;}
.briefing-body{padding:14px;background:var(--s1);border-radius:0 0 8px 8px;border:1px solid var(--border);border-top:none;margin-bottom:12px;}
.brtext{background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15);border-radius:6px;padding:10px;font-size:13px;line-height:1.7;}
.liveclock{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;}
.lct{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:4px;color:var(--lc);line-height:1;}
.lcd{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div id="root"></div>

<script>
const SUPABASE_URL = 'https://hfndlrfqijwuxhwydhns.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IB2dOie5ji9zbXl-JZPu6w_CCrDW2kT';
const STRIPE_LINK = 'https://buy.stripe.com/3cI5kDeBLgjJ90b8ujbV601';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  user: null, bar: null, staff: [], sales: [], inventory: [], photos: [],
  checklist: {}, closeoutSubmitted: false,
  tab: 'dashboard', lang: 'en', authMode: 'login',
  authLoading: false, authError: '', appLoading: true,
  showStaffModal: false, showInvModal: false, showSaleModal: false,
  newStaff: {name:'',role:'',pin:''},
  newInv: {name:'',category:'',unit:'',stock:'',par_level:''},
  newSale: {bar_sales:'',food_sales:'',cash:'',card_sales:'',tips:'',comps:'',notes:'',submitted_by:''},
  loginEmail:'', loginPassword:'', loginBarName:'', loginLocation:'',
  clockedIn: [], selectedStaff: null, briefingRead: [],
  liveTime: '', photoCaption: null, generatingCaption: false,
  selectedPhoto: null, photoTag: 'Social Media', photoNote: '',
  recipeSearch: '', recipeFilter: 'All',
};

const CHECKLIST_DATA = {
  '🧹 Cleaning':['Wipe down all bar surfaces','Clean beer taps & lines','Mop floors','Empty trash & replace bags','Clean bathrooms'],
  '🍺 Bar':['Count remaining liquor bottles','Log any breakage or spillage','Restock for next shift','Lock liquor storage'],
  '💰 Cash':['Count cash drawer','Separate tips','Prepare bank deposit','Reconcile card totals'],
  '🔒 Security':['Check all doors & windows locked','Turn off all equipment','Set alarm'],
};
const ALL_ITEMS = Object.values(CHECKLIST_DATA).flat();

const COLORS = ['#c8102e','#d4a017','#00e87a','#4488ff','#a855f7','#00d4aa','#ff8c42','#ff6eb4'];

const RECIPES = [
  {id:1,emoji:'🍹',name:'Cantina Margarita',tag:'Signature',glass:'Rocks',prepTime:'2 min',cost:2.80,price:14,
    ingredients:[{amount:'2 oz',name:'Blanco Tequila',note:'well tequila'},{amount:'1 oz',name:'Cointreau',note:''},{amount:'3/4 oz',name:'Fresh lime juice',note:'squeeze to order'},{amount:'1/2 oz',name:'Agave syrup',note:''}],
    steps:['Tajín rim the glass. Fill with fresh ice.','Shake tequila, Cointreau, lime, agave with ice for 10 seconds.','Double strain over fresh rocks. Lime wheel garnish.']},
  {id:2,emoji:'🍺',name:'Michelada',tag:'Signature',glass:'Pint glass',prepTime:'1.5 min',cost:1.60,price:10,
    ingredients:[{amount:'1',name:'Modelo Especial',note:'ice cold'},{amount:'2 oz',name:'Clamato juice',note:''},{amount:'4 dashes',name:'Valentina hot sauce',note:''},{amount:'1 dash',name:'Soy sauce',note:"secret — don't skip"}],
    steps:['Tajín rim. Fill pint glass with ice.','Mix Clamato, lime, Valentina, Worcestershire, soy sauce.','Pour Modelo slowly. Dust Tajín on top.']},
  {id:3,emoji:'🍊',name:'Paloma',tag:'Classic',glass:'Highball',prepTime:'1.5 min',cost:1.90,price:12,
    ingredients:[{amount:'2 oz',name:'Blanco Tequila',note:''},{amount:'1/2 oz',name:'Fresh lime juice',note:''},{amount:'4 oz',name:'Jarritos Grapefruit',note:'preferred over Squirt'}],
    steps:['Salt rim. Fill highball with ice.','Add tequila and lime juice.','Top with Jarritos. Stir gently.']},
  {id:4,emoji:'🥃',name:'Old Fashioned',tag:'Premium',glass:'Rocks',prepTime:'3 min',cost:3.20,price:16,
    ingredients:[{amount:'2 oz',name:'Bulleit Bourbon',note:''},{amount:'1/4 oz',name:'Demerara syrup',note:'2:1'},{amount:'2 dashes',name:'Angostura bitters',note:''}],
    steps:['Large ice cube in rocks glass.','Stir all ingredients with ice for 30 seconds.','Strain over the big cube. Orange peel garnish.']},
];

function margin(r){return r.price>0?Math.round(((r.price-r.cost)/r.price)*100):0;}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  setInterval(()=>{
    const now = new Date();
    state.liveTime = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const el = document.getElementById('clock-display');
    if(el) el.textContent = state.liveTime;
  },1000);

  const {data:{session}} = await db.auth.getSession();
  if(session){
    state.user = session.user;
    await loadBar();
  }
  state.appLoading = false;
  render();

  db.auth.onAuthStateChange(async (event, session) => {
    if(session){
      state.user = session.user;
      await loadBar();
    } else {
      state.user = null; state.bar = null;
    }
    render();
  });
}

async function loadBar(){
  const {data} = await db.from('bars').select('*').eq('owner_email', state.user.email).single();
  if(data){
    state.bar = data;
    await Promise.all([loadStaff(), loadSales(), loadInventory(), loadPhotos()]);
  }
}

async function loadStaff(){
  if(!state.bar) return;
  const {data} = await db.from('staff').select('*').eq('bar_id', state.bar.id).order('created_at');
  state.staff = data||[];
}
async function loadSales(){
  if(!state.bar) return;
  const {data} = await db.from('sales').select('*').eq('bar_id', state.bar.id).order('created_at', {ascending:false}).limit(30);
  state.sales = data||[];
}
async function loadInventory(){
  if(!state.bar) return;
  const {data} = await db.from('inventory').select('*').eq('bar_id', state.bar.id).order('name');
  state.inventory = data||[];
}
async function loadPhotos(){
  if(!state.bar) return;
  const {data} = await db.from('photos').select('*').eq('bar_id', state.bar.id).order('created_at',{ascending:false}).limit(50);
  state.photos = data||[];
}

// ── AUTH ───────────────────────────────────────────────────────────────────
async function handleAuth(){
  state.authError=''; state.authLoading=true; render();
  const email = state.loginEmail.trim();
  const password = state.loginPassword.trim();

  if(state.authMode==='login'){
    const {data,error} = await db.auth.signInWithPassword({email,password});
    if(error){ state.authError=error.message; state.authLoading=false; render(); return; }
  } else {
    if(!state.loginBarName.trim()){ state.authError='Bar name is required'; state.authLoading=false; render(); return; }
    const {data,error} = await db.auth.signUp({email,password});
    if(error){ state.authError=error.message; state.authLoading=false; render(); return; }
    if(data.user){
      await db.from('bars').insert({
        name: state.loginBarName.trim(),
        location: state.loginLocation.trim(),
        owner_email: email,
      });
    }
  }
  state.authLoading=false; render();
}

async function logout(){
  await db.auth.signOut();
  state.user=null; state.bar=null; state.staff=[]; state.sales=[]; state.inventory=[]; state.photos=[];
  state.checklist={}; state.closeoutSubmitted=false;
  render();
}

// ── STAFF ──────────────────────────────────────────────────────────────────
async function saveStaff(){
  if(!state.newStaff.name||!state.bar) return;
  await db.from('staff').insert({bar_id:state.bar.id,...state.newStaff});
  state.newStaff={name:'',role:'',pin:''};
  state.showStaffModal=false;
  await loadStaff(); render();
}
async function deleteStaff(id){
  await db.from('staff').delete().eq('id',id);
  await loadStaff(); render();
}

// ── SALES ──────────────────────────────────────────────────────────────────
async function saveSale(){
  if(!state.bar) return;
  await db.from('sales').insert({bar_id:state.bar.id,...state.newSale});
  state.newSale={bar_sales:'',food_sales:'',cash:'',card_sales:'',tips:'',comps:'',notes:'',submitted_by:''};
  state.showSaleModal=false;
  await loadSales(); render();
}

// ── INVENTORY ──────────────────────────────────────────────────────────────
async function saveInv(){
  if(!state.newInv.name||!state.bar) return;
  await db.from('inventory').insert({bar_id:state.bar.id,...state.newInv,stock:parseFloat(state.newInv.stock)||0,par_level:parseFloat(state.newInv.par_level)||0});
  state.newInv={name:'',category:'',unit:'',stock:'',par_level:''};
  state.showInvModal=false;
  await loadInventory(); render();
}
async function deleteInv(id){
  await db.from('inventory').delete().eq('id',id);
  await loadInventory(); render();
}
async function updateStock(id, newStock){
  await db.from('inventory').update({stock:newStock,updated_at:new Date()}).eq('id',id);
  await loadInventory(); render();
}

// ── CHECKLIST ──────────────────────────────────────────────────────────────
function toggleCheck(item){
  state.checklist[item]=!state.checklist[item];
  render();
}
async function submitCloseout(){
  const all = ALL_ITEMS;
  if(all.filter(i=>state.checklist[i]).length < all.length) return;
  if(!state.bar) return;
  await db.from('checklist_logs').insert({
    bar_id: state.bar.id,
    completed_by: state.newSale.submitted_by||'Manager',
    items_completed: state.checklist,
  });
  state.closeoutSubmitted=true; render();
}

// ── PHOTOS ─────────────────────────────────────────────────────────────────
async function handlePhotoUpload(e){
  const files = Array.from(e.target.files);
  for(const file of files){
    const reader = new FileReader();
    reader.onload = async ev => {
      await db.from('photos').insert({
        bar_id: state.bar.id,
        label: state.photoNote||file.name,
        tag: state.photoTag,
        staff_name: '',
        url: ev.target.result,
        created_at: new Date(),
      });
      await loadPhotos(); render();
    };
    reader.readAsDataURL(file);
  }
  state.photoNote=''; e.target.value='';
}

async function generateCaption(photo){
  state.generatingCaption=true; state.photoCaption=null; render();
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:`Write a fun Instagram caption for ${state.bar?.name||'our bar'}. Photo: "${photo.label}". Include 1-2 emojis and 3-4 hashtags. Under 150 chars before hashtags.`}]})
    });
    const data = await res.json();
    state.photoCaption = data.content?.find(b=>b.type==='text')?.text||'Could not generate.';
  }catch{ state.photoCaption='Could not generate caption.'; }
  state.generatingCaption=false; render();
}

}

            ${r.ingredients.map(i=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--teal);width:50px;flex-shrink:0">${i.amount}</div><div style="font-size:13px;font-weight:600;flex:1">${i.name}</div>${i.note?`<div style="font-size:11px;color:var(--muted);font-style:italic">${i.note}</div>`:''}</div>`).join('')}
            <div style="font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;color:var(--lcg);margin:12px 0 8px">STEPS</div>
            ${r.steps.map((s,i)=>`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="width:24px;height:24px;border-radius:50%;background:rgba(200,16,46,.15);border:1px solid rgba(200,16,46,.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:13px;color:var(--lc);flex-shrink:0">${i+1}</div><div style="font-size:13px;line-height:1.6">${s}</div></div>`).join('')}
          </div>
        `).join('')}
      `:''}

      ${state.tab==='closeout'?`
        <div class="sec-title">${L?'CIERRE DE NOCHE':'END OF NIGHT'}</div>
        <div class="card">
          <div class="ct">${L?'LISTA DE CIERRE':'CLOSING CHECKLIST'}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${L?'El personal debe completarla antes del cierre':'Staff must complete before submitting closeout'}</div>
          <div class="cprog"><div class="cbar" style="width:${pct}%"></div></div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${checkedCount}/${ALL_ITEMS.length} complete — ${pct}%</div>
          ${Object.entries(CHECKLIST_DATA).map(([group,items])=>`
            <div class="cgroup-t">${group}</div>
            ${items.map(item=>`
              <div class="citem" onclick="toggleCheck('${item.replace(/'/g,"\\'")}')">
                <div class="cbox ${state.checklist[item]?'done':''}">${state.checklist[item]?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#000" stroke-width="2" fill="none"/></svg>':''}</div>
                <span class="ctxt ${state.checklist[item]?'done':''}">${item}</span>
              </div>
            `).join('')}
          `).join('')}
        </div>
        <div class="card">
          <div class="ct">${L?'FORMULARIO DE CIERRE':'CLOSEOUT FORM'}</div>
          ${state.closeoutSubmitted?`<div class="success-box">✓ ${L?'CIERRE ENVIADO EXITOSAMENTE':'CLOSEOUT SUBMITTED SUCCESSFULLY!'}</div>`:`
          <div class="form-grid">
            <div class="field"><label>${L?'Ventas del Bar ($)':'Bar Sales ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.bar_sales}" oninput="state.newSale.bar_sales=this.value"/></div>
            <div class="field"><label>${L?'Ventas de Comida ($)':'Food Sales ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.food_sales}" oninput="state.newSale.food_sales=this.value"/></div>
            <div class="field"><label>${L?'Efectivo ($)':'Cash ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.cash}" oninput="state.newSale.cash=this.value"/></div>
            <div class="field"><label>${L?'Tarjeta ($)':'Card Sales ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.card_sales}" oninput="state.newSale.card_sales=this.value"/></div>
            <div class="field"><label>${L?'Propinas ($)':'Tips ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.tips}" oninput="state.newSale.tips=this.value"/></div>
            <div class="field"><label>${L?'Cortesías ($)':'Comps ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.comps}" oninput="state.newSale.comps=this.value"/></div>
          </div>
          <div class="field"><label>${L?'Personal de Cierre':'Closing Staff'}</label>
            <select onchange="state.newSale.submitted_by=this.value" style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;width:100%;outline:none">
              <option value="">${L?'Seleccionar':'Select staff member'}</option>
              ${state.staff.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>${L?'Notas':'Notes / Incidents'}</label><textarea style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;width:100%;resize:vertical;min-height:60px" placeholder="${L?'Cualquier incidente o nota para el dueño...':'Any issues or notes for the owner...'}" oninput="state.newSale.notes=this.value">${state.newSale.notes}</textarea></div>
          <button class="subbtn ${allDone?'ready':'locked'}" onclick="submitCloseout()" ${allDone?'':'disabled'}>${allDone?(L?'ENVIAR CIERRE':'SUBMIT CLOSEOUT'):(L?`COMPLETA LA LISTA PRIMERO (${ALL_ITEMS.length-checkedCount} restantes)`:`COMPLETE CHECKLIST FIRST (${ALL_ITEMS.length-checkedCount} remaining)`)}</button>
          `}
        </div>
      `:''}

    </main>

    <nav class="bot-nav">
      ${TABS.map(tab=>`<button class="nb ${state.tab===tab.key?'on':''}" onclick="state.tab='${tab.key}';render()"><span class="ni">${tab.icon}</span><span class="nl">${tab.label}</span></button>`).join('')}
    </nav>

    ${state.showStaffModal?`
      <div class="modal-bg" onclick="state.showStaffModal=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">+ ${t('addStaff')}</div>
          <div class="field"><label>${L?'Nombre':'Name'}</label><input type="text" value="${state.newStaff.name}" oninput="state.newStaff.name=this.value" placeholder="Maria G."/></div>
          <div class="field"><label>${L?'Rol':'Role'}</label><input type="text" value="${state.newStaff.role}" oninput="state.newStaff.role=this.value" placeholder="Bartender"/></div>
          <div class="field"><label>PIN</label><input type="number" value="${state.newStaff.pin}" oninput="state.newStaff.pin=this.value" placeholder="1234"/></div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="state.showStaffModal=false;render()">${t('cancel')}</button>
            <button class="btn-save" onclick="saveStaff()">${t('save')}</button>
          </div>
        </div>
      </div>
    `:''}

    ${state.showInvModal?`
      <div class="modal-bg" onclick="state.showInvModal=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">+ ${t('addItem')}</div>
          <div class="field"><label>${L?'Nombre':'Name'}</label><input type="text" value="${state.newInv.name}" oninput="state.newInv.name=this.value" placeholder="Patron Silver"/></div>
          <div class="field"><label>${L?'Categoría':'Category'}</label><input type="text" value="${state.newInv.category}" oninput="state.newInv.category=this.value" placeholder="Tequila"/></div>
          <div class="field"><label>${L?'Unidad':'Unit'}</label><input type="text" value="${state.newInv.unit}" oninput="state.newInv.unit=this.value" placeholder="750ml, Keg, Case..."/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field"><label>${L?'Stock Actual':'Current Stock'}</label><input type="number" value="${state.newInv.stock}" oninput="state.newInv.stock=this.value"/></div>
            <div class="field"><label>Par ${L?'Nivel':'Level'}</label><input type="number" value="${state.newInv.par_level}" oninput="state.newInv.par_level=this.value"/></div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="state.showInvModal=false;render()">${t('cancel')}</button>
            <button class="btn-save" onclick="saveInv()">${t('save')}</button>
          </div>
        </div>
      </div>
    `:''}

    ${state.showSaleModal?`
      <div class="modal-bg" onclick="state.showSaleModal=false;render()">
        <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
          <div class="modal-title">+ ${t('addSale')}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field"><label>${L?'Ventas Bar ($)':'Bar Sales ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.bar_sales}" oninput="state.newSale.bar_sales=this.value"/></div>
            <div class="field"><label>${L?'Comida ($)':'Food ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.food_sales}" oninput="state.newSale.food_sales=this.value"/></div>
            <div class="field"><label>${L?'Efectivo ($)':'Cash ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.cash}" oninput="state.newSale.cash=this.value"/></div>
            <div class="field"><label>${L?'Tarjeta ($)':'Cards ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.card_sales}" oninput="state.newSale.card_sales=this.value"/></div>
            <div class="field"><label>${L?'Propinas ($)':'Tips ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.tips}" oninput="state.newSale.tips=this.value"/></div>
            <div class="field"><label>${L?'Cortesías ($)':'Comps ($)'}</label><input type="number" placeholder="0.00" value="${state.newSale.comps}" oninput="state.newSale.comps=this.value"/></div>
          </div>
          <div class="field"><label>${L?'Notas':'Notes'}</label><input type="text" value="${state.newSale.notes}" oninput="state.newSale.notes=this.value" placeholder="${L?'Notas del turno...':'Shift notes...'}"/></div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="state.showSaleModal=false;render()">${t('cancel')}</button>
            <button class="btn-save" onclick="saveSale()">${t('save')}</button>
          </div>
        </div>
      </div>
    `:''}

  </div>`;
}

function bindAuth(){
  document.querySelectorAll('input').forEach(input=>{
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') handleAuth(); });
  });
}
function bindApp(){}

init();
</script>
</body>
</html>
