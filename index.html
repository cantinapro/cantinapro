<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CantinaPro — Bar Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#1a1a24;--s3:#222234;
  --border:#2a2a3a;--gold:#f5a623;--amber:#e8820c;
  --red:#ff4455;--green:#00e87a;--blue:#4488ff;--purple:#a855f7;--teal:#00d4aa;
  --text:#e8e8f0;--muted:#6b6b80;--lc:#c8102e;--lcg:#d4a017;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.auth-logo{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:8px;color:var(--lc);line-height:1;}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--lcg);margin-top:4px;}
.auth-div{width:60px;height:2px;background:linear-gradient(90deg,var(--lc),var(--lcg));margin:24px auto;}
.auth-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:24px;width:100%;max-width:360px;}
.auth-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;margin-bottom:20px;}
.auth-tabs{display:flex;background:var(--s2);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;border:none;background:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.auth-tab.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.field input,.field select,.field textarea{background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;width:100%;}
.field input:focus,.field select:focus{border-color:var(--lc);}
.field textarea{resize:vertical;min-height:60px;}
.auth-btn{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;cursor:pointer;margin-top:4px;}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;}
.auth-err{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);border-radius:6px;padding:10px;font-size:13px;color:var(--red);margin-bottom:12px;}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.hdr-logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;color:var(--lc);}
.hdr-bar{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--lcg);letter-spacing:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.lang-wrap{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.lb{background:none;border:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;padding:4px 8px;cursor:pointer;}
.lb.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:1px;padding:4px 8px;border-radius:4px;cursor:pointer;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bot-nav{background:var(--s1);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;}
.nb{background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;flex:1;padding:8px 2px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;transition:all .2s;position:relative;}
.nb.on{color:var(--lc);border-top-color:var(--lc);}
.ni{font-size:16px;line-height:1;}
.nl{font-size:8px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.nbadge{position:absolute;top:4px;right:10%;background:var(--red);color:#fff;font-size:8px;border-radius:8px;padding:1px 4px;font-weight:700;}

/* MAIN */
.main{flex:1;padding:14px;padding-bottom:74px;}
.tab-content{display:none;}
.tab-content.on{display:block;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.ct{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.lc::before{background:linear-gradient(90deg,var(--lc),var(--lcg));}
.kpi.g::before{background:var(--green);}
.kpi.r::before{background:var(--red);}
.kpi.b::before{background:var(--blue);}
.kl{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.kv{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;line-height:1;}
.kpi.lc .kv{color:var(--lc);}
.kpi.g .kv{color:var(--green);}
.kpi.r .kv{color:var(--red);}
.kpi.b .kv{color:var(--blue);}
.kd{font-size:11px;color:var(--muted);}

/* BUTTONS */
.action-btn{width:100%;padding:12px;border:none;border-radius:8px;font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:8px;}
.action-btn.red{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.action-btn.green{background:linear-gradient(135deg,var(--green),#00a050);color:#000;}
.action-btn.blue{background:linear-gradient(135deg,var(--blue),#2266cc);color:#fff;}
.action-btn.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;}
.action-btn.purple{background:linear-gradient(135deg,var(--purple),#7722cc);color:#fff;}
.action-btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-sm{padding:6px 12px;border:none;border-radius:6px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;cursor:pointer;}

/* ROWS */
.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.mono{font-family:'Share Tech Mono',monospace;}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;}

/* INVENTORY */
.inv-table{width:100%;border-collapse:collapse;}
.inv-table th{font-size:9px;letter-spacing:1px;color:var(--muted);padding:8px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;}
.inv-table td{padding:9px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.inv-table tr:last-child td{border-bottom:none;}
.stock-pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.stock-ok{background:#0d3320;color:var(--green);}
.stock-low{background:#3d1800;color:#ff9040;}
.stock-out{background:#2d0008;color:var(--red);}

/* CHECKLIST */
.cprog{background:var(--s2);border-radius:4px;overflow:hidden;height:6px;margin-bottom:10px;}
.cbar{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.cgroup-t{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:12px;font-weight:700;}
.citem{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.citem:last-child{border-bottom:none;}
.cbox{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--s3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cbox.done{background:var(--green);border-color:var(--green);}
.ctxt{font-size:13px;font-weight:500;}
.ctxt.done{color:var(--muted);text-decoration:line-through;}
.subbtn{width:100%;padding:14px;border-radius:6px;border:none;font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:12px;}
.subbtn.ready{background:var(--gold);color:#000;}
.subbtn.locked{background:var(--s2);color:var(--muted);cursor:not-allowed;border:1px solid var(--border);}

/* GALLERY */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pcard{border-radius:8px;overflow:hidden;border:1px solid var(--border);aspect-ratio:1;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;background:var(--s2);}
.pcard:hover{border-color:var(--lc);}
.pcard img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:8px;}
.photo-label{font-size:10px;color:#fff;font-weight:700;}
.photo-time{font-size:9px;color:rgba(255,255,255,.6);font-family:'Share Tech Mono',monospace;}
.upzone{border:2px dashed var(--border);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.upzone:hover{border-color:var(--lc);}

/* SPINNER */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--lc);border-radius:50%;animation:spin 1s linear infinite;margin:12px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:28px 16px;color:var(--muted);font-size:13px;line-height:1.7;}

/* SUCCESS */
.success-box{background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.3);border-radius:8px;padding:14px;text-align:center;font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;color:var(--green);margin-bottom:12px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:500;padding:0;}
.modal{background:var(--s2);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions button{flex:1;padding:10px;border-radius:6px;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;border:none;cursor:pointer;}
.btn-cancel{background:var(--s3);color:var(--muted);}
.btn-save{background:var(--lc);color:#fff;}

/* SCHEDULE */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-nav button{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;}
.week-label{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);}
.day-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--s2);color:var(--muted);font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center;min-width:52px;}
.day-tab.on{background:var(--lc);border-color:var(--lc);color:#fff;}
.day-tab.has-shifts{border-color:var(--lcg);color:var(--lcg);}
.day-tab.on.has-shifts{background:var(--lc);border-color:var(--lc);color:#fff;}
.shift-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;position:relative;}
.shift-card.open{border-color:rgba(255,68,85,.4);background:rgba(255,68,85,.05);}
.shift-card.covered{border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.04);}
.shift-time{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--text);}
.shift-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.shift-staff{display:flex;align-items:center;gap:8px;margin-top:8px;}
.shift-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
.shift-badge.scheduled{background:rgba(68,136,255,.15);color:var(--blue);}
.shift-badge.open{background:rgba(255,68,85,.15);color:var(--red);}
.shift-badge.pending{background:rgba(245,166,35,.15);color:var(--gold);}
.shift-badge.covered{background:rgba(0,232,122,.15);color:var(--green);}
.bid-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.bid-row:last-child{border-bottom:none;}
.open-shifts-banner{background:rgba(255,68,85,.08);border:1px solid rgba(255,68,85,.25);border-radius:8px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.staff-sched-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
.sched-day-label{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
.my-shift-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.my-shift-time{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:var(--text);}
.clock-wrap{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;}
.lct{font-family:'Bebas Neue',cursive;font-size:44px;letter-spacing:4px;color:var(--lc);line-height:1;}
.lcd{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.staff-pick{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .2s;}
.staff-pick:hover,.staff-pick.on{background:rgba(200,16,46,.1);border-color:var(--lc);}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL='https://hfndlrfqijwuxhwydhns.supabase.co';
const SUPABASE_KEY='sb_publishable_IB2dOie5ji9zbXl-JZPu6w_CCrDW2kT';
const STRIPE_LINK='https://buy.stripe.com/3cI5kDeBLgjJ90b8ujbV601';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);

const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const COLORS=['#c8102e','#d4a017','#00e87a','#4488ff','#a855f7','#00d4aa','#ff8c42','#ff6eb4'];

const CHECKLIST_DATA={
  '🧹 Cleaning':['Wipe down all bar surfaces','Clean beer taps & lines','Mop floors','Empty trash & replace bags','Clean bathrooms'],
  '🍺 Bar':['Count remaining liquor bottles','Log any breakage or spillage','Restock for next shift','Lock liquor storage'],
  '💰 Cash':['Count cash drawer','Separate tips','Prepare bank deposit','Reconcile card totals'],
  '🔒 Security':['Check all doors & windows locked','Turn off all equipment','Set alarm'],
};
const ALL_ITEMS=Object.values(CHECKLIST_DATA).flat();

const RECIPES=[
  {id:1,emoji:'🍹',name:'Cantina Margarita',tag:'Signature',glass:'Rocks',prepTime:'2 min',cost:2.80,price:14,
    ingredients:[{amount:'2 oz',name:'Blanco Tequila',note:'well tequila'},{amount:'1 oz',name:'Cointreau',note:''},{amount:'3/4 oz',name:'Fresh lime juice',note:'squeeze to order'},{amount:'1/2 oz',name:'Agave syrup',note:''}],
    steps:['Tajín rim the glass. Fill with fresh ice.','Shake tequila, Cointreau, lime, agave with ice 10 sec.','Double strain over fresh rocks. Lime wheel garnish.']},
  {id:2,emoji:'🍺',name:'Michelada',tag:'Signature',glass:'Pint glass',prepTime:'1.5 min',cost:1.60,price:10,
    ingredients:[{amount:'1',name:'Modelo Especial',note:'ice cold'},{amount:'2 oz',name:'Clamato juice',note:''},{amount:'4 dashes',name:'Valentina hot sauce',note:''},{amount:'1 dash',name:'Soy sauce',note:"secret"}],
    steps:['Tajín rim. Fill pint glass with ice.','Mix Clamato, lime, Valentina, Worcestershire, soy sauce.','Pour Modelo slowly. Dust Tajín on top.']},
  {id:3,emoji:'🍊',name:'Paloma',tag:'Classic',glass:'Highball',prepTime:'1.5 min',cost:1.90,price:12,
    ingredients:[{amount:'2 oz',name:'Blanco Tequila',note:''},{amount:'1/2 oz',name:'Fresh lime juice',note:''},{amount:'4 oz',name:'Jarritos Grapefruit',note:'preferred'}],
    steps:['Salt rim. Fill highball with ice.','Add tequila and lime juice.','Top with Jarritos. Stir gently.']},
  {id:4,emoji:'🥃',name:'Old Fashioned',tag:'Premium',glass:'Rocks',prepTime:'3 min',cost:3.20,price:16,
    ingredients:[{amount:'2 oz',name:'Bulleit Bourbon',note:''},{amount:'1/4 oz',name:'Demerara syrup',note:'2:1'},{amount:'2 dashes',name:'Angostura bitters',note:''}],
    steps:['Large ice cube in rocks glass.','Stir all ingredients with ice 30 sec.','Strain over the big cube. Orange peel garnish.']},
];

// ── STATE ──────────────────────────────────────────────
let S={
  user:null,bar:null,staff:[],sales:[],inventory:[],photos:[],schedules:[],bids:[],
  checklist:{},closeoutSubmitted:false,
  tab:'dashboard',lang:'en',authMode:'login',
  authLoading:false,authError:'',appLoading:true,
  showStaffModal:false,showInvModal:false,showSaleModal:false,showShiftModal:false,showDropModal:false,
  newStaff:{name:'',role:'',pin:''},
  newInv:{name:'',category:'',unit:'',stock:'',par_level:''},
  newSale:{bar_sales:'',food_sales:'',cash:'',card_sales:'',tips:'',comps:'',notes:'',submitted_by:''},
  newShift:{staff_id:'',day_of_week:1,start_time:'',end_time:'',role:''},
  loginEmail:'',loginPassword:'',loginBarName:'',loginLocation:'',
  clockedIn:[],selectedStaff:null,
  liveTime:'',photoCaption:null,generatingCaption:false,selectedPhoto:null,photoTag:'Social Media',photoNote:'',
  recipeSearch:'',recipeFilter:'All',selectedRecipe:null,
  schedDay:new Date().getDay(),weekOffset:0,
  dropShiftId:null,dropReason:'',
};

function margin(r){return r.price>0?Math.round(((r.price-r.cost)/r.price)*100):0;}
function getWeekStart(offset=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+(offset*7));d.setHours(0,0,0,0);return d;}
function fmtDate(d){return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function avatarColor(idx){return COLORS[idx%COLORS.length];}
function avatarInitials(name){return name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();}

// ── INIT ───────────────────────────────────────────────
async function init(){
  setInterval(()=>{
    S.liveTime=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const el=document.getElementById('clock-el');if(el)el.textContent=S.liveTime;
  },1000);
  const {data:{session}}=await db.auth.getSession();
  if(session){S.user=session.user;await loadBar();}
  S.appLoading=false;render();
  db.auth.onAuthStateChange(async(_,session)=>{
    if(session){S.user=session.user;await loadBar();}
    else{S.user=null;S.bar=null;}
    render();
  });
}

async function loadBar(){
  const {data}=await db.from('bars').select('*').eq('owner_email',S.user.email).single();
  if(data){S.bar=data;await Promise.all([loadStaff(),loadSales(),loadInventory(),loadPhotos(),loadSchedules()]);}
}
async function loadStaff(){if(!S.bar)return;const {data}=await db.from('staff').select('*').eq('bar_id',S.bar.id).order('name');S.staff=data||[];}
async function loadSales(){if(!S.bar)return;const {data}=await db.from('sales').select('*').eq('bar_id',S.bar.id).order('created_at',{ascending:false}).limit(30);S.sales=data||[];}
async function loadInventory(){if(!S.bar)return;const {data}=await db.from('inventory').select('*').eq('bar_id',S.bar.id).order('name');S.inventory=data||[];}
async function loadPhotos(){if(!S.bar)return;const {data}=await db.from('photos').select('*').eq('bar_id',S.bar.id).order('created_at',{ascending:false}).limit(50);S.photos=data||[];}
async function loadSchedules(){
  if(!S.bar)return;
  const ws=getWeekStart(S.weekOffset);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const {data:scheds}=await db.from('schedules').select('*').eq('bar_id',S.bar.id).order('day_of_week').order('start_time');
  const {data:bids}=await db.from('shift_bids').select('*').eq('bar_id',S.bar.id);
  S.schedules=scheds||[];S.bids=bids||[];
}

// ── AUTH ───────────────────────────────────────────────
async function handleAuth(){
  S.authError='';S.authLoading=true;render();
  const email=S.loginEmail.trim(),password=S.loginPassword.trim();
  if(S.authMode==='login'){
    const {error}=await db.auth.signInWithPassword({email,password});
    if(error){S.authError=error.message;S.authLoading=false;render();return;}
  }else{
    if(!S.loginBarName.trim()){S.authError='Bar name is required';S.authLoading=false;render();return;}
    const {data,error}=await db.auth.signUp({email,password});
    if(error){S.authError=error.message;S.authLoading=false;render();return;}
    if(data.user){await db.from('bars').insert({name:S.loginBarName.trim(),location:S.loginLocation.trim(),owner_email:email});}
  }
  S.authLoading=false;render();
}
async function logout(){
  await db.auth.signOut();
  Object.assign(S,{user:null,bar:null,staff:[],sales:[],inventory:[],photos:[],schedules:[],bids:[],checklist:{},closeoutSubmitted:false,clockedIn:[],selectedStaff:null});
  render();
}

async function saveInv(){

// ── SCHEDULE ───────────────────────────────────────────
async function saveShift(){
  if(!S.newShift.start_time||!S.newShift.end_time||!S.bar)return;
  await db.from('schedules').insert({
    bar_id:S.bar.id,
    staff_id:S.newShift.staff_id||null,
    staff_name:S.newShift.staff_id?(S.staff.find(s=>s.id===S.newShift.staff_id)?.name||''):'OPEN',
    day_of_week:parseInt(S.newShift.day_of_week),
    start_time:S.newShift.start_time,
    end_time:S.newShift.end_time,
    role:S.newShift.role,
    status:S.newShift.staff_id?'scheduled':'open',
  });
  S.newShift={staff_id:'',day_of_week:S.schedDay,start_time:'',end_time:'',role:''};
  S.showShiftModal=false;await loadSchedules();render();
}
async function deleteShift(id){await db.from('schedules').delete().eq('id',id);await loadSchedules();render();}
async function dropShift(id){
  if(!S.dropReason)return;
  await db.from('schedules').update({status:'open',dropped_by:S.dropReason}).eq('id',id);
  S.showDropModal=false;S.dropShiftId=null;S.dropReason='';
  await loadSchedules();render();
}
async function bidOnShift(shiftId,staffId,staffName){
  const existing=S.bids.find(b=>b.shift_id===shiftId&&b.staff_id===staffId);
  if(existing)return;
  await db.from('shift_bids').insert({bar_id:S.bar.id,shift_id:shiftId,staff_id:staffId,staff_name:staffName,status:'pending'});
  await loadSchedules();render();
}
async function approveBid(bidId,shiftId,staffId,staffName){
  await db.from('shift_bids').update({status:'approved'}).eq('id',bidId);
  await db.from('schedules').update({status:'covered',staff_id:staffId,staff_name:staffName}).eq('id',shiftId);
  await db.from('shift_bids').update({status:'declined'}).eq('shift_id',shiftId).neq('id',bidId);
  await loadSchedules();render();
}
async function declineBid(bidId){
  await db.from('shift_bids').update({status:'declined'}).eq('id',bidId);
  await loadSchedules();render();
}

function toggleCheck(item){S.checklist[item]=!S.checklist[item];render();}
async function submitCloseout(){
  if(ALL_ITEMS.filter(i=>S.checklist[i]).length<ALL_ITEMS.length)return;
  await db.from('checklist_logs').insert({bar_id:S.bar.id,completed_by:S.newSale.submitted_by||'Manager',items_completed:S.checklist});
  await saveSaleFromCloseout();
  S.closeoutSubmitted=true;render();
}

}

// ── PHOTOS ─────────────────────────────────────────────
async function handlePhotoUpload(e){
  const files=Array.from(e.target.files);
  for(const file of files){
    const reader=new FileReader();
    reader.onload=async ev=>{
      await db.from('photos').insert({bar_id:S.bar.id,label:S.photoNote||file.name,tag:S.photoTag,url:ev.target.result,created_at:new Date()});
      await loadPhotos();render();
    };
    reader.readAsDataURL(file);
  }
  S.photoNote='';e.target.value='';
}
async function generateCaption(photo){
  S.generatingCaption=true;S.photoCaption=null;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        messages:[{role:'user',content:`Write a fun Instagram caption for ${S.bar?.name||'our bar'}. Photo: "${photo.label}". Include 1-2 emojis and 3-4 hashtags. Under 150 chars before hashtags.`}]})});
    const data=await res.json();
    S.photoCaption=data.content?.find(b=>b.type==='text')?.text||'Could not generate.';
  }catch{S.photoCaption='Could not generate caption.';}
  S.generatingCaption=false;render();
}

          const isIn=S.clockedIn.includes(S.selectedStaff);
          return isIn
            ?`<button class="action-btn red" onclick="S.clockedIn=S.clockedIn.filter(id=>id!=='${S.selectedStaff}');render()">⏹ ${L?'FINALIZAR TURNO':'CLOCK OUT'}</button>`
            :`<button class="action-btn green" onclick="S.clockedIn=[...S.clockedIn,'${S.selectedStaff}'];render()">▶ ${L?'INICIAR TURNO':'CLOCK IN'}</button>`;
        })():`<button class="action-btn" style="background:var(--s2);color:var(--muted);border:1px solid var(--border)" disabled>${L?'SELECCIONA TU NOMBRE':'SELECT YOUR NAME'}</button>`}
      </div>
      <button class="action-btn blue" onclick="S.showStaffModal=true;render()">+ ${L?'Añadir Personal':'Add Staff'}</button>

      ${S.showStaffModal?`<div class="modal-bg" onclick="S.showStaffModal=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">+ ${L?'AÑADIR PERSONAL':'ADD STAFF'}</div>
          <div class="field"><label>${L?'Nombre':'Name'}</label><input type="text" value="${S.newStaff.name}" oninput="S.newStaff.name=this.value" placeholder="Maria G."/></div>
          <div class="field"><label>${L?'Rol':'Role'}</label><input type="text" value="${S.newStaff.role}" oninput="S.newStaff.role=this.value" placeholder="Bartender"/></div>
          <div class="field"><label>PIN</label><input type="number" value="${S.newStaff.pin}" oninput="S.newStaff.pin=this.value" placeholder="1234"/></div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="S.showStaffModal=false;render()">${L?'Cancelar':'Cancel'}</button>
            <button class="btn-save" onclick="saveStaff()">${L?'Guardar':'Save'}</button>
          </div>
        </div>
      </div>`:''}
    `:''}

    ${S.tab==='inventory'?`
      <div class="sec-title">📦 ${L?'INVENTARIO':'INVENTORY'}</div>
      <button class="action-btn red" onclick="S.showInvModal=true;render()" style="margin-bottom:12px">+ ${L?'Añadir Artículo':'Add Item'}</button>
      <div class="card" style="padding:0;overflow:hidden">
        ${S.inventory.length===0?`<div class="empty-state" style="padding:32px">No inventory yet.<br/>Add your first item above.</div>`:`
        <div style="overflow-x:auto">
          <table class="inv-table">
            <thead><tr><th>${L?'Artículo':'Item'}</th><th>${L?'Unidad':'Unit'}</th><th>Stock</th><th>Par</th><th>${L?'Estado':'Status'}</th><th></th></tr></thead>
            <tbody>
              ${S.inventory.map(item=>{
                const st=item.stock===0?'out':item.stock<=(item.par_level*0.5)?'low':'ok';
                return `<tr>
                  <td><div style="font-weight:700">${item.name}</div><div style="font-size:11px;color:var(--muted)">${item.category||''}</div></td>
                  <td style="font-size:12px;color:var(--muted)">${item.unit||''}</td>
                  <td><input type="number" value="${item.stock}" onchange="updateStock('${item.id}',parseFloat(this.value)||0)" style="background:var(--s2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:13px;width:56px;outline:none;font-family:'Share Tech Mono',monospace"/></td>
                  <td style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)">${item.par_level}</td>
                  <td><span class="stock-pill ${st==='ok'?'stock-ok':st==='low'?'stock-low':'stock-out'}">${st.toUpperCase()}</span></td>
                  <td><button onclick="deleteInv('${item.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">×</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
      ${S.showInvModal?`<div class="modal-bg" onclick="S.showInvModal=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-title">+ ${L?'AÑADIR ARTÍCULO':'ADD INVENTORY ITEM'}</div>
          <div class="field"><label>${L?'Nombre':'Name'}</label><input type="text" value="${S.newInv.name}" oninput="S.newInv.name=this.value" placeholder="Patron Silver"/></div>
          <div class="field"><label>${L?'Categoría':'Category'}</label><input type="text" value="${S.newInv.category}" oninput="S.newInv.category=this.value" placeholder="Tequila"/></div>
          <div class="field"><label>${L?'Unidad':'Unit'}</label><input type="text" value="${S.newInv.unit}" oninput="S.newInv.unit=this.value" placeholder="750ml, Keg, Case..."/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field"><label>${L?'Stock Actual':'Current Stock'}</label><input type="number" value="${S.newInv.stock}" oninput="S.newInv.stock=this.value"/></div>
            <div class="field"><label>Par Level</label><input type="number" value="${S.newInv.par_level}" oninput="S.newInv.par_level=this.value"/></div>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="S.showInvModal=false;render()">${L?'Cancelar':'Cancel'}</button>
            <button class="btn-save" onclick="saveInv()">${L?'Guardar':'Save'}</button>
          </div>
        </div>
      </div>`:''}
    `:''}

    ${S.tab==='gallery'?`
      <div class="sec-title">📸 ${L?'GALERÍA':'GALLERY'}</div>
      ${S.selectedPhoto?`
        <button onclick="S.selectedPhoto=null;S.photoCaption=null;render()" style="background:none;border:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;cursor:pointer;margin-bottom:12px">← ${L?'VOLVER':'BACK'}</button>
        <div class="card">
          <div style="background:linear-gradient(135deg,#1a0008,#0a0a1a);border-radius:8px;overflow:hidden;margin-bottom:12px;min-height:160px;display:flex;align-items:center;justify-content:center;position:relative">
            ${S.selectedPhoto.url?`<img src="${S.selectedPhoto.url}" style="max-width:100%;max-height:240px;object-fit:contain"/>`:''} 
            <div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.8);border-radius:4px;padding:4px 8px">
              <div style="font-family:'Bebas Neue',cursive;font-size:10px;color:var(--lc)">CantinaPro</div>
              <div style="font-family:'Bebas Neue',cursive;font-size:8px;color:var(--lcg)">${S.bar.name}</div>
            </div>
          </div>
          <button class="action-btn purple" onclick="generateCaption(S.selectedPhoto)" ${S.generatingCaption?'disabled':''}>✨ ${L?'GENERAR SUBTÍTULO IA':'GENERATE AI CAPTION'}</button>
          ${S.generatingCaption?'<div class="spinner"></div>':''}
          ${S.photoCaption?`<div style="background:var(--s2);border:1px solid var(--purple);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;margin-top:8px">${S.photoCaption}<button onclick="navigator.clipboard?.writeText(this.parentElement.childNodes[0].textContent.trim());this.textContent='✓ COPIED!';setTimeout(()=>this.textContent='COPY',2000)" style="display:block;margin-top:8px;background:none;border:1px solid var(--purple);color:var(--purple);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'Bebas Neue',cursive;letter-spacing:1px">COPY</button></div>`:''}
        </div>
      `:`
        <div class="card">
          <div class="ct">${L?'AÑADIR FOTO':'ADD PHOTO'}</div>
          <div class="field"><label>Tag</label>
            <select onchange="S.photoTag=this.value" style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;width:100%;outline:none">
              ${['Social Media','Gallery','Event','Promo','Behind the Scenes','Staff'].map(t=>`<option ${S.photoTag===t?'selected':''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>${L?'Descripción':'Caption'}</label><input type="text" value="${S.photoNote}" oninput="S.photoNote=this.value" placeholder="${L?'¿Qué está pasando?':'What\'s happening?'}"/></div>
          <label style="display:block;cursor:pointer">
            <input type="file" accept="image/*" multiple capture="environment" style="display:none" onchange="handlePhotoUpload(event)"/>
            <div class="upzone"><div style="font-size:28px;margin-bottom:6px">📷</div><div style="font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:var(--muted)">${L?'TOMAR O SUBIR FOTO':'TAKE OR UPLOAD PHOTO'}</div></div>
          </label>
        </div>
        <div class="photo-grid">
          ${S.photos.map(p=>`
            <div class="pcard" onclick="S.selectedPhoto=${JSON.stringify(p).replace(/"/g,'&quot;')};S.photoCaption=null;render()">
              ${p.url?`<img src="${p.url}" alt="${p.label}"/>`:'<div style="font-size:32px">📷</div>'}
              <div class="photo-overlay">
                <div class="photo-label">${p.label||p.tag}</div>
                <div class="photo-time">${new Date(p.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
          `).join('')}
          ${S.photos.length===0?`<div class="empty-state" style="grid-column:span 2">No photos yet.<br/>Take your first shot above!</div>`:''}
        </div>
      `}
    `:''}

    ${S.tab==='closeout'?`
      <div class="sec-title">✅ ${L?'CIERRE DE NOCHE':'END OF NIGHT'}</div>
      <div class="card">
        <div class="ct">${L?'LISTA DE CIERRE':'CLOSING CHECKLIST'}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${L?'Completa antes de enviar el cierre':'Complete all items before submitting closeout'}</div>
        <div class="cprog"><div class="cbar" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${checkedCount}/${ALL_ITEMS.length} — ${pct}%</div>
        ${Object.entries(CHECKLIST_DATA).map(([group,items])=>`
          <div class="cgroup-t">${group}</div>
          ${items.map(item=>`
            <div class="citem" onclick="toggleCheck('${item.replace(/'/g,"\\'")}')">
              <div class="cbox ${S.checklist[item]?'done':''}">${S.checklist[item]?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#000" stroke-width="2" fill="none"/></svg>':''}</div>
              <span class="ctxt ${S.checklist[item]?'done':''}">${item}</span>
            </div>
          `).join('')}
        `).join('')}
      </div>
      <div class="card">
        <div class="ct">${L?'FORMULARIO DE CIERRE':'CLOSEOUT FORM'}</div>
        ${S.closeoutSubmitted?`<div class="success-box">✓ ${L?'CIERRE ENVIADO':'CLOSEOUT SUBMITTED!'}</div>`:`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="field"><label>${L?'Ventas Bar ($)':'Bar Sales ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.bar_sales}" oninput="S.newSale.bar_sales=this.value"/></div>
            <div class="field"><label>${L?'Comida ($)':'Food ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.food_sales}" oninput="S.newSale.food_sales=this.value"/></div>
            <div class="field"><label>${L?'Efectivo ($)':'Cash ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.cash}" oninput="S.newSale.cash=this.value"/></div>
            <div class="field"><label>${L?'Tarjeta ($)':'Cards ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.card_sales}" oninput="S.newSale.card_sales=this.value"/></div>
            <div class="field"><label>${L?'Propinas ($)':'Tips ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.tips}" oninput="S.newSale.tips=this.value"/></div>
            <div class="field"><label>${L?'Cortesías ($)':'Comps ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.comps}" oninput="S.newSale.comps=this.value"/></div>
          </div>
          <div class="field"><label>${L?'Personal de Cierre':'Closing Staff'}</label>
            <select onchange="S.newSale.submitted_by=this.value" style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;width:100%;outline:none">
              <option value="">${L?'Seleccionar':'Select staff member'}</option>
              ${S.staff.map(s=>`<option value="${s.name}">${s.name}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>${L?'Notas':'Notes'}</label><textarea style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 12px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;width:100%;resize:vertical;min-height:60px" placeholder="${L?'Incidentes o notas para el dueño...':'Any incidents or notes...'}" oninput="S.newSale.notes=this.value">${S.newSale.notes}</textarea></div>
          <button class="subbtn ${allDone?'ready':'locked'}" onclick="${allDone?'submitCloseout()':''}" ${allDone?'':'disabled'}>${allDone?(L?'ENVIAR CIERRE':'SUBMIT CLOSEOUT'):`COMPLETE CHECKLIST (${ALL_ITEMS.length-checkedCount} left)`}</button>
        `}
      </div>
    `:''}

    ${S.showSaleModal?`<div class="modal-bg" onclick="S.showSaleModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">+ ${L?'REGISTRAR VENTAS':'LOG SALES'}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="field"><label>${L?'Ventas Bar ($)':'Bar Sales ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.bar_sales}" oninput="S.newSale.bar_sales=this.value"/></div>
          <div class="field"><label>${L?'Comida ($)':'Food ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.food_sales}" oninput="S.newSale.food_sales=this.value"/></div>
          <div class="field"><label>${L?'Efectivo ($)':'Cash ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.cash}" oninput="S.newSale.cash=this.value"/></div>
          <div class="field"><label>${L?'Tarjeta ($)':'Cards ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.card_sales}" oninput="S.newSale.card_sales=this.value"/></div>
          <div class="field"><label>${L?'Propinas ($)':'Tips ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.tips}" oninput="S.newSale.tips=this.value"/></div>
          <div class="field"><label>${L?'Cortesías ($)':'Comps ($)'}</label><input type="number" placeholder="0.00" value="${S.newSale.comps}" oninput="S.newSale.comps=this.value"/></div>
        </div>
        <div class="field"><label>${L?'Notas':'Notes'}</label><input type="text" value="${S.newSale.notes}" oninput="S.newSale.notes=this.value" placeholder="${L?'Notas del turno...':'Shift notes...'}"/></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="S.showSaleModal=false;render()">${L?'Cancelar':'Cancel'}</button>
          <button class="btn-save" onclick="saveSale()">${L?'Guardar':'Save'}</button>
        </div>
      </div>
    </div>`:''}

    </main>

    <nav class="bot-nav">
      ${TABS.map(tab=>`<button class="nb ${S.tab===tab.key?'on':''}" onclick="S.tab='${tab.key}';render()">
        <span class="ni">${tab.icon}</span>
        <span class="nl">${tab.label}</span>
        ${tab.badge?`<span class="nbadge">${tab.badge}</span>`:''}
      </button>`).join('')}
    </nav>
  </div>`;
}

// Need schedules table in Supabase
async function ensureScheduleTable(){
  await db.rpc('create_schedules_if_not_exists').catch(()=>{});
}

init();
</script>
</body>
</html>
