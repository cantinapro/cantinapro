<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#080810"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CantinaPro"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;CantinaPro&quot;,&quot;short_name&quot;:&quot;CantinaPro&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23080810&quot;,&quot;theme_color&quot;:&quot;%23c8102e&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;https://cantinapro.github.io/cantinapro/icon.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;}]}"/>
<title>CantinaPro — Bar Management App</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080810;--s1:#12121e;--s2:#1c1c2e;--s3:#26263a;--border:#3a3a55;--gold:#f5a623;--amber:#e8820c;--red:#ff4455;--green:#00e87a;--blue:#4d9fff;--purple:#b366ff;--teal:#00d4aa;--text:#f0f0ff;--muted:#9999bb;--lc:#c8102e;--lcg:#d4a017;}
html,body{height:100%;width:100%;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;font-size:16px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
#root{min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.auth-logo{font-family:'Bebas Neue',cursive;font-size:56px;letter-spacing:8px;color:var(--lc);line-height:1;}
.auth-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;color:var(--lcg);margin-top:6px;}
.auth-div{width:60px;height:2px;background:linear-gradient(90deg,var(--lc),var(--lcg));margin:20px auto;}
.auth-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:400px;}
.auth-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;margin-bottom:20px;color:var(--text);}
.auth-tabs{display:flex;background:var(--s2);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:12px;border:none;background:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.auth-tab.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.field input,.field select,.field textarea{background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:13px 14px;font-size:16px;font-family:'Rajdhani',sans-serif;outline:none;width:100%;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--lc);}
.field textarea{resize:vertical;min-height:70px;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:52px;}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px;line-height:1;}
.auth-btn{width:100%;padding:16px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;cursor:pointer;margin-top:6px;-webkit-appearance:none;}
.auth-btn:disabled{opacity:.6;}
.auth-err{background:rgba(255,68,85,.12);border:1px solid rgba(255,68,85,.4);border-radius:8px;padding:12px;font-size:15px;color:var(--red);margin-bottom:14px;}

/* PIN */
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;}
.pin-btn{padding:20px;border:1px solid var(--border);border-radius:12px;background:var(--s2);color:var(--text);font-family:'Bebas Neue',cursive;font-size:26px;cursor:pointer;text-align:center;-webkit-appearance:none;transition:background .1s,transform .1s;}
.pin-btn:active{background:var(--s3);transform:scale(.96);}
.pin-display{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:32px;letter-spacing:10px;margin-bottom:6px;min-height:62px;color:var(--lc);}
.staff-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
.staff-sel-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:center;transition:border-color .2s,background .2s;}
.staff-sel-card:active{background:var(--s3);}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;}
.hdr-logo{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:4px;color:var(--lc);}
.hdr-bar{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--lcg);letter-spacing:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.lang-wrap{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.lb{background:none;border:none;color:var(--muted);font-family:'Bebas Neue',cursive;font-size:13px;padding:5px 9px;cursor:pointer;}
.lb.on{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',cursive;font-size:11px;padding:5px 8px;border-radius:4px;cursor:pointer;}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.staff-badge{background:rgba(212,160,23,.2);border:1px solid rgba(212,160,23,.4);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--lcg);font-family:'Share Tech Mono',monospace;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bot-nav{background:var(--s1);border-top:2px solid var(--border);display:flex;position:fixed;bottom:0;left:0;right:0;width:100%;max-width:480px;margin:0 auto;z-index:999;padding-bottom:env(safe-area-inset-bottom,0px);}
.nb{background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;flex:1;padding:10px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:3px solid transparent;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent;}
.nb.on{color:var(--lc);border-top-color:var(--lc);}
.ni{font-size:18px;line-height:1;}
.nl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:inherit;}
.nbadge{position:absolute;top:5px;right:6%;background:var(--red);color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;font-weight:700;}

/* MAIN */
.main{flex:1;padding:16px;padding-bottom:90px;overflow-y:auto;}
.sec-title{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.ct{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi.lc::before{background:linear-gradient(90deg,var(--lc),var(--lcg));}
.kpi.g::before{background:var(--green);}
.kpi.r::before{background:var(--red);}
.kpi.b::before{background:var(--blue);}
.kl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.kv{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;line-height:1;}
.kpi.lc .kv{color:var(--lc);}
.kpi.g .kv{color:var(--green);}
.kpi.r .kv{color:var(--red);}
.kpi.b .kv{color:var(--blue);}
.kd{font-size:12px;color:var(--muted);margin-top:2px;}

/* BUTTONS */
.action-btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:2px;cursor:pointer;margin-top:8px;display:block;text-align:center;-webkit-appearance:none;}
.action-btn.red{background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;}
.action-btn.green{background:linear-gradient(135deg,var(--green),#00a050);color:#000;}
.action-btn.blue{background:linear-gradient(135deg,var(--blue),#2266cc);color:#fff;}
.action-btn.purple{background:linear-gradient(135deg,var(--purple),#7722cc);color:#fff;}
.action-btn.gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:#000;}
.action-btn:disabled{opacity:.5;}
.btn-sm{padding:8px 14px;border:none;border-radius:6px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;}

/* ROWS */
.row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}

/* INVENTORY */
.inv-table{width:100%;border-collapse:collapse;}
.inv-table th{font-size:10px;letter-spacing:1px;color:var(--muted);padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;}
.inv-table td{padding:11px 8px;border-bottom:1px solid var(--border);font-size:14px;}
.inv-table tr:last-child td{border-bottom:none;}
.stock-pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.stock-ok{background:#0d3320;color:var(--green);}
.stock-low{background:#3d1800;color:#ff9040;}
.stock-out{background:#2d0008;color:var(--red);}

/* CHECKLIST */
.cprog{background:var(--s2);border-radius:4px;overflow:hidden;height:7px;margin-bottom:12px;}
.cbar{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}
.cgroup-t{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:14px;font-weight:700;}
.citem{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.citem:last-child{border-bottom:none;}
.cbox{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.cbox.done{background:var(--green);border-color:var(--green);}
.ctxt{font-size:15px;font-weight:500;}
.ctxt.done{color:var(--muted);text-decoration:line-through;}
.subbtn{width:100%;padding:16px;border-radius:8px;border:none;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;cursor:pointer;margin-top:14px;-webkit-appearance:none;}
.subbtn.ready{background:var(--gold);color:#000;}
.subbtn.locked{background:var(--s2);color:var(--muted);border:1px solid var(--border);}

/* GALLERY */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pcard{border-radius:10px;overflow:hidden;border:1px solid var(--border);aspect-ratio:1;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s2);}
.pcard img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:10px;}
.photo-label{font-size:11px;color:#fff;font-weight:700;}
.photo-time{font-size:10px;color:rgba(255,255,255,.7);font-family:'Share Tech Mono',monospace;}
.upzone{border:2px dashed var(--border);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:14px;}

/* MISC */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--lc);border-radius:50%;animation:spin 1s linear infinite;margin:14px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:15px;line-height:1.8;}
.success-box{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.4);border-radius:10px;padding:16px;text-align:center;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;color:var(--green);margin-bottom:14px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:1000;}
.modal{background:var(--s2);border:1px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;margin-bottom:18px;color:var(--text);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-actions button{flex:1;padding:14px;border-radius:8px;font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;border:none;cursor:pointer;}
.btn-cancel{background:var(--s3);color:var(--muted);}
.btn-save{background:var(--lc);color:#fff;}

/* SCHEDULE */
.day-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--s2);color:var(--muted);font-family:'Bebas Neue',cursive;font-size:12px;cursor:pointer;text-align:center;min-width:52px;-webkit-appearance:none;}
.day-tab.on{background:var(--lc);border-color:var(--lc);color:#fff;}
.day-tab.has-open{border-color:var(--red);color:var(--red);}
.shift-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.shift-card.open{border-color:rgba(255,68,85,.5);background:rgba(255,68,85,.06);}
.shift-card.covered{border-color:rgba(0,232,122,.4);background:rgba(0,232,122,.05);}
.shift-card.mine{border-color:rgba(212,160,23,.5);background:rgba(212,160,23,.05);}
.shift-time{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--text);}
.shift-role{font-size:13px;color:var(--muted);text-transform:uppercase;margin-top:3px;}
.shift-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-block;margin-top:8px;}
.shift-badge.scheduled{background:rgba(77,159,255,.2);color:var(--blue);}
.shift-badge.open{background:rgba(255,68,85,.2);color:var(--red);}
.shift-badge.covered{background:rgba(0,232,122,.2);color:var(--green);}
.shift-badge.mine{background:rgba(212,160,23,.2);color:var(--lcg);}
.bid-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.bid-row:last-child{border-bottom:none;}
.open-banner{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.3);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.staff-pick{background:var(--s2);border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;}
.staff-pick.on{background:rgba(200,16,46,.12);border-color:var(--lc);}
.my-shift-highlight{background:rgba(212,160,23,.1);border:2px solid rgba(212,160,23,.4);border-radius:10px;padding:16px;margin-bottom:14px;text-align:center;}
.link-box{background:var(--s2);border:2px solid var(--lcg);border-radius:10px;padding:14px;margin-bottom:10px;}
.link-url{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--lcg);word-break:break-all;margin-bottom:12px;line-height:1.6;}
.install-banner{background:rgba(77,159,255,.1);border:1px solid rgba(77,159,255,.3);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}

/* ─── PREMIUM TIME CLOCK ─── */
.clock-hero{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden;}
.clock-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lc),var(--lcg),var(--lc));}
.clock-hero-time{font-family:'Bebas Neue',cursive;font-size:58px;letter-spacing:5px;color:var(--lc);line-height:1;margin-bottom:4px;}
.clock-hero-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}
.clock-hero-bar{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--lcg);margin-top:4px;}

.clock-status-in{background:linear-gradient(135deg,rgba(0,232,122,.12),rgba(0,232,122,.04));border:2px solid rgba(0,232,122,.5);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;}
.clock-status-out{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;}
.clock-elapsed{font-family:'Bebas Neue',cursive;font-size:44px;letter-spacing:4px;color:var(--green);line-height:1;}
.clock-elapsed-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.clock-in-time{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);margin-top:8px;}

.clock-btn-in{width:100%;padding:20px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--green),#00b055);color:#000;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 24px rgba(0,232,122,.25);transition:transform .1s,box-shadow .1s;}
.clock-btn-in:active{transform:scale(.98);box-shadow:0 2px 12px rgba(0,232,122,.15);}
.clock-btn-out{width:100%;padding:20px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--lc),#a00020);color:#fff;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 24px rgba(200,16,46,.3);transition:transform .1s,box-shadow .1s;}
.clock-btn-out:active{transform:scale(.98);box-shadow:0 2px 12px rgba(200,16,46,.15);}

/* Late alert */
.late-alert{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.4);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.early-alert{background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}

/* Staff clock cards (owner view) */
.floor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.floor-card{background:var(--s2);border:2px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;}
.floor-card.clocked-in{border-color:rgba(0,232,122,.5);background:rgba(0,232,122,.05);}
.floor-card.late{border-color:rgba(255,68,85,.5);background:rgba(255,68,85,.05);}
.floor-card-name{font-weight:700;font-size:15px;color:var(--text);margin-top:8px;}
.floor-card-role{font-size:11px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.floor-card-time{font-family:'Share Tech Mono',monospace;font-size:12px;margin-top:8px;}
.floor-card-elapsed{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;margin-top:4px;}
.floor-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}

/* Time History Table */
.th-table{width:100%;border-collapse:collapse;}
.th-table th{font-size:10px;letter-spacing:1px;color:var(--muted);padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;}
.th-table td{padding:11px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.th-table tr:last-child td{border-bottom:none;}
.hours-pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace;}

/* Edit clock modal */

// ─── TIME CLOCK HELPERS ───────────────────────────────────────────────────
function fmtElapsed(ms){
  if(ms<0)ms=0;
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  const s=Math.floor((ms%60000)/1000);
  if(h>0)return`${h}h ${String(m).padStart(2,'0')}m`;
  return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtHours(ms){
  if(!ms||ms<0)return'0:00';
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return`${h}:${String(m).padStart(2,'0')}`;
}
function fmtTime(ts){
  if(!ts)return'--:--';
  return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts){
  if(!ts)return'';
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function todayKey(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function rememberStaff(bar, staffMember){
  try{
    localStorage.setItem('cp_remembered', JSON.stringify({
      barId: bar.id,
      barName: bar.name,
      barLocation: bar.location||'',
      staffId: staffMember.id,
      staffName: staffMember.name,
      staffRole: staffMember.role,
      staffPin: staffMember.pin,
      savedAt: Date.now(),
    }));
  }catch(e){}
}
function getRemembered(){
  try{
    const raw=localStorage.getItem('cp_remembered');
    if(!raw)return null;
    const d=JSON.parse(raw);
    // expire after 90 days
    if(Date.now()-d.savedAt > 90*24*3600000){localStorage.removeItem('cp_remembered');return null;}
    return d;
  }catch(e){return null;}
}
function forgetStaff(){

// ─── INIT ─────────────────────────────────────────────────────────────────
async function init(){
  setInterval(()=>{
    const now=new Date();
    S.liveTime=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    S.liveMs=now.getTime();
    // update live clock display without full re-render
    const el=document.getElementById('clock-el');if(el)el.textContent=S.liveTime;
    // update elapsed timers in DOM (clock tab + staff mgmt tab)
    Object.entries(S.clockedInStaff).forEach(([sid,entry])=>{
      const elapsed=now.getTime()-new Date(entry.clock_in).getTime();
      const elEl=document.getElementById('elapsed-'+sid);
      if(elEl)elEl.textContent=fmtElapsed(elapsed);
      const smEl=document.getElementById('elapsed-sm-'+sid);
      if(smEl)smEl.textContent=fmtElapsed(elapsed);
    });
    // staff self-view elapsed
    if(S.staffUser){
      const myEntry=S.clockedInStaff[S.staffUser.id];
      if(myEntry){
        const elapsed=now.getTime()-new Date(myEntry.clock_in).getTime();
        const selfEl=document.getElementById('self-elapsed');
        if(selfEl)selfEl.textContent=fmtElapsed(elapsed);
      }
    }
  },1000);

  const urlBarId=getBarIdFromURL();
  if(urlBarId){
    S.urlBarId=urlBarId;
    const{data:bar}=await db.from('bars').select('*').eq('id',urlBarId).single();
    if(bar){

          await loadSchedules();await loadStaff();await loadMyClockEntries();
          S.tab='staff-shift';
          S.appLoading=false;render();return;

      }

  const{data:{session}}=await db.auth.getSession();
  if(session){S.user=session.user;await loadBar();}
  S.appLoading=false;render();

// ─── CLOCK ENTRIES LOADER ─────────────────────────────────────────────────
async function loadClockEntries(){
  if(!S.bar)return;
  // load last 30 days of entries
  const since=new Date();since.setDate(since.getDate()-30);
  const{data}=await db.from('clock_entries').select('*').eq('bar_id',S.bar.id)
    .gte('clock_in',since.toISOString()).order('clock_in',{ascending:false});
  S.clockEntries=data||[];
  // rebuild clockedInStaff map from open entries (no clock_out)
  S.clockedInStaff={};
  S.clockEntries.forEach(e=>{
    if(!e.clock_out){
      S.clockedInStaff[e.staff_id]={entry_id:e.id,clock_in:e.clock_in};
    }
  });
}

// ─── CLOCK IN / OUT ACTIONS ───────────────────────────────────────────────
async function clockIn(staffId,staffName,barId){
  // prevent double clock-in
  if(S.clockedInStaff[staffId])return;
  const entry={
    bar_id:barId||S.bar.id,
    staff_id:staffId,
    staff_name:staffName,
    clock_in:new Date().toISOString(),
    clock_out:null,
    hours_ms:null,
    date_key:todayKey(),
  };
  const{data}=await db.from('clock_entries').insert(entry).select().single();
  if(data){
    S.clockedInStaff[staffId]={entry_id:data.id,clock_in:data.clock_in};
    S.clockEntries.unshift(data);
    if(S.staffUser&&S.staffUser.id===staffId)S.myClockEntries=[data,...(S.myClockEntries||[])];
  }
  render();
}

async function clockOut(staffId){
  const session=S.clockedInStaff[staffId];
  if(!session)return;
  const now=new Date().toISOString();
  const elapsed=new Date(now).getTime()-new Date(session.clock_in).getTime();
  await db.from('clock_entries').update({clock_out:now,hours_ms:elapsed}).eq('id',session.entry_id);
  delete S.clockedInStaff[staffId];
  // update local state
  const idx=S.clockEntries.findIndex(e=>e.id===session.entry_id);
  if(idx>=0){S.clockEntries[idx].clock_out=now;S.clockEntries[idx].hours_ms=elapsed;}
  if(S.myClockEntries){
    const mi=S.myClockEntries.findIndex(e=>e.id===session.entry_id);
    if(mi>=0){S.myClockEntries[mi].clock_out=now;S.myClockEntries[mi].hours_ms=elapsed;}
  }
  S.showConfirmClockOut=false;S.confirmClockOutId=null;
  render();
}

// ─── CLOCK STATS HELPERS ──────────────────────────────────────────────────
function getTodayEntries(staffId){
  const key=todayKey();
  return S.clockEntries.filter(e=>e.staff_id===staffId&&e.date_key===key);
}
function getWeekEntries(staffId){
  const now=new Date();
  const weekAgo=new Date(now.getTime()-7*24*3600000);
  return S.clockEntries.filter(e=>e.staff_id===staffId&&new Date(e.clock_in)>=weekAgo);
}
function sumHours(entries){
  return entries.reduce((a,e)=>{
    if(e.hours_ms)return a+e.hours_ms;
    if(!e.clock_out)return a+(Date.now()-new Date(e.clock_in).getTime());
    return a;
  },0);
}
function getShiftLateMinutes(staffId){
  // compare today's scheduled start vs actual clock-in
  const todayShift=S.schedules.find(s=>s.staff_id===staffId&&s.day_of_week===new Date().getDay());
  if(!todayShift)return null;
  const todayEntry=getTodayEntries(staffId)[0];
  if(!todayEntry)return null;
  const scheduled=parseScheduleTime(todayShift.start_time);
  const actual=new Date(todayEntry.clock_in).getTime();
  const diffMin=Math.round((actual-scheduled)/60000);
  return diffMin; // positive = late, negative = early
}
function parseScheduleTime(timeStr){
  // timeStr like "18:00" or "6:00 PM"
  const d=new Date();
  const[h,m]=(timeStr||'').split(':').map(Number);
  if(!isNaN(h)){d.setHours(h,m||0,0,0);}
  return d.getTime();
}

  if(Object.values(S.newSale).some(v=>v&&v!==''))await db.from('sales').insert({bar_id:S.bar.id,...S.newSale});
  S.closeoutSubmitted=true;render();
}
async function handlePhotoUpload(e){
  const files=Array.from(e.target.files);
  for(const file of files){
    const reader=new FileReader();
    reader.onload=async ev=>{await db.from('photos').insert({bar_id:S.bar.id,label:S.photoNote||file.name,tag:S.photoTag,url:ev.target.result,created_at:new Date()});await loadPhotos();render();};
    reader.readAsDataURL(file);
  }
  S.photoNote='';e.target.value='';
}
async function generateCaption(photo){
  S.generatingCaption=true;S.photoCaption=null;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:`Write a fun Instagram caption for ${S.bar?.name||'our bar'}. Photo: "${photo.label}". Include 1-2 emojis and 3-4 hashtags. Under 150 chars before hashtags.`}]})});
    const data=await res.json();S.photoCaption=data.content?.find(b=>b.type==='text')?.text||'Could not generate.';
  }catch{S.photoCaption='Could not generate caption.';}
  S.generatingCaption=false;render();
}
function copyStaffLink(){
  navigator.clipboard?.writeText(getStaffLink()).then(()=>{
    const btn=document.getElementById('copy-link-btn');
    if(btn){btn.textContent='✓ COPIED!';setTimeout(()=>btn.textContent='📋 COPY STAFF LINK',2000);}

}

async function saveRecipe(){

  const recipe={bar_id:S.bar.id,name:S.newRecipe.name,tag:S.newRecipe.tag,glass:S.newRecipe.glass,prep_time:S.newRecipe.prep_time,cost:parseFloat(S.newRecipe.cost)||0,price:parseFloat(S.newRecipe.price)||0,emoji:S.newRecipe.emoji||'🍹',ingredients:S.newRecipe.ingredients.filter(i=>i.name),steps:S.newRecipe.steps.filter(s=>s)};

  else{await db.from('recipes').insert(recipe);}
  S.newRecipe={name:'',tag:'Signature',glass:'',prep_time:'2 min',cost:'',price:'',emoji:'🍹',ingredients:[{amount:'',name:'',note:''}],steps:['']};

function editRecipe(r){

function recipeMargin(cost,price){return price>0?Math.round(((price-cost)/price)*100):0;}

// ─── RENDER ROUTER ────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(S.appLoading){root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>';return;}

}

function renderStaffShiftTab(L,myTodayShift,isClockedIn,mySession,myEntries,todayMs,weekMs){
  const now=Date.now();
  const elapsed=mySession?now-new Date(mySession.clock_in).getTime():0;

  // Late/early alert
  let alertHtml='';
  if(myTodayShift&&!isClockedIn&&myEntries.filter(e=>e.date_key===todayKey()).length===0){
    const scheduled=parseScheduleTime(myTodayShift.start_time);
    const minsLate=Math.round((now-scheduled)/60000);
    if(minsLate>10){
      alertHtml=`<div class="late-alert"><div style="font-size:20px">⚠️</div><div><div style="font-weight:700;color:var(--red)">CLOCKING IN LATE</div><div style="font-size:13px;color:var(--muted)">Your shift started at ${myTodayShift.start_time} — ${minsLate} min ago</div></div></div>`;
    } else if(minsLate<-10){
      alertHtml=`<div class="early-alert"><div style="font-size:20px">👍</div><div><div style="font-weight:700;color:var(--green)">EARLY ARRIVAL!</div><div style="font-size:13px;color:var(--muted)">Shift starts at ${myTodayShift.start_time} — you're ${Math.abs(minsLate)} min early</div></div></div>`;
    }

    ${openShifts.length>0?`<div class="open-banner"><div style="font-size:24px">🔴</div><div><div style="font-weight:700;font-size:17px;color:var(--text)">${openShifts.length} Open Shift${openShifts.length!==1?'s':''}</div><div style="font-size:14px;color:var(--muted)">Tap any open shift to bid</div></div></div>`:''}
    <div class="day-tabs">
      ${DAYS.map((d,i)=>{
        const hasOpen=S.schedules.some(s=>s.day_of_week===i&&s.status==='open');
        return `<button class="day-tab ${S.schedDay===i?'on':''} ${hasOpen&&S.schedDay!==i?'has-open':''}" onclick="S.schedDay=${i};render()">
          <div>${d}</div>${hasOpen?'<div style="font-size:8px;color:var(--red)">OPEN</div>':''}
        </button>`;
      }).join('')}
    </div>
    ${S.schedules.filter(s=>s.day_of_week===S.schedDay).length===0?`<div class="empty-state">No shifts scheduled for ${DAYS[S.schedDay]}.</div>`:''}
    ${S.schedules.filter(s=>s.day_of_week===S.schedDay).map(shift=>{
      const isMyShift=shift.staff_id===S.staffUser.id;
      const hasBid=S.bids.find(b=>b.shift_id===shift.id&&b.staff_id===S.staffUser.id);
      const staffIdx=S.staff.findIndex(s=>s.id===shift.staff_id);
      const color=staffIdx>=0?ac(staffIdx):'var(--muted)';
      return `<div class="shift-card ${isMyShift?'mine':shift.status==='open'?'open':shift.status==='covered'?'covered':''}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div class="shift-time">${shift.start_time} – ${shift.end_time}</div>
            <div class="shift-role">${shift.role||'Staff'}</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
              ${shift.status!=='open'?`<div class="av" style="background:${color}22;color:${color};width:28px;height:28px;font-size:10px">${shift.staff_name?ai(shift.staff_name):'?'}</div>`:''}
              <span class="shift-badge ${isMyShift?'mine':shift.status}">${isMyShift?'⭐ YOUR SHIFT':shift.status==='open'?'🔴 OPEN':shift.status==='covered'?'✅ COVERED':shift.staff_name}</span>
            </div>
            ${shift.dropped_by?`<div style="font-size:13px;color:var(--muted);margin-top:6px">Dropped: ${shift.dropped_by}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
            ${isMyShift&&shift.status==='scheduled'?`<button class="btn-sm" style="background:rgba(255,68,85,.2);color:var(--red);font-size:13px;padding:9px 14px" onclick="S.dropShiftId='${shift.id}';S.showDropModal=true;render()">DROP</button>`:''}
            ${shift.status==='open'&&!isMyShift?hasBid?`<span style="font-size:13px;color:var(--gold);font-family:'Share Tech Mono',monospace">BID SENT ⏳</span>`:
              `<button class="btn-sm" style="background:rgba(0,232,122,.2);color:var(--green);font-size:13px;padding:9px 14px" onclick="bidOnShift('${shift.id}','${S.staffUser.id}','${S.staffUser.name}')">BID</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('')}
    ${S.showDropModal?`<div class="modal-bg" onclick="S.showDropModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">DROP THIS SHIFT</div>
        <div style="font-size:15px;color:var(--muted);margin-bottom:16px;line-height:1.6">Your shift will open for others to bid. Your manager will be notified.</div>
        <div class="field"><label>Reason for dropping</label><input type="text" value="${S.dropReason}" oninput="S.dropReason=this.value" placeholder="Family emergency, sick, etc."/></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="S.showDropModal=false;render()">Cancel</button>
          <button class="btn-save" style="background:var(--red)" onclick="dropShift('${S.dropShiftId}')">DROP SHIFT</button>
        </div>
      </div>
    </div>`:''}
  `;
}

// ─── OWNER TIME CLOCK VIEW ────────────────────────────────────────────────
function renderOwnerTimeClock(){
  const now=Date.now();
  const onFloor=S.staff.filter(s=>S.clockedInStaff[s.id]);
  const offFloor=S.staff.filter(s=>!S.clockedInStaff[s.id]);

  // Filter clock entries for history view
  let historyEntries=[];
  if(S.clockHistoryView==='today'){
    const k=todayKey();
    historyEntries=S.clockEntries.filter(e=>e.date_key===k);
  }else if(S.clockHistoryView==='week'){
    const weekAgo=new Date(now-7*24*3600000);
    historyEntries=S.clockEntries.filter(e=>new Date(e.clock_in)>=weekAgo);
  }else{
    historyEntries=S.clockEntries;
  }

  // Per-staff weekly hours
  const staffWeekHours={};
  S.staff.forEach(st=>{
    const entries=getWeekEntries(st.id);
    staffWeekHours[st.id]=sumHours(entries);
  });

  return `
    <div class="sec-title">⏱ TIME CLOCK</div>

    <!-- Live Clock -->
    <div class="clock-hero">
      <div class="clock-hero-time" id="clock-el">${S.liveTime||'--:--:--'}</div>
      <div class="clock-hero-date">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      <div class="clock-hero-bar">${S.bar.name}</div>
    </div>

    <!-- WHO'S ON THE FLOOR -->
    <div class="card">
      <div class="ct" style="display:flex;align-items:center;justify-content:space-between">
        <span>🟢 ON THE FLOOR (${onFloor.length})</span>
        ${onFloor.length>0?`<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--green)">LIVE</span>`:''}
      </div>
      ${onFloor.length===0?`<div style="color:var(--muted);font-size:15px;text-align:center;padding:12px">No staff clocked in yet.</div>`:''}
      <div class="floor-grid">
        ${onFloor.map((s,i)=>{
          const session=S.clockedInStaff[s.id];
          const elapsed=now-new Date(session.clock_in).getTime();
          const late=getShiftLateMinutes(s.id);
          const isLate=late!==null&&late>10;
          const staffIdx=S.staff.findIndex(st=>st.id===s.id);
          const color=ac(staffIdx>=0?staffIdx:i);
          return `<div class="floor-card clocked-in ${isLate?'late':''}">
            <div class="av" style="background:${color}22;color:${color};margin:0 auto">${ai(s.name)}</div>
            <div class="floor-card-name">${s.name}</div>
            <div class="floor-card-role">${s.role}</div>
            <div class="floor-card-elapsed" style="color:var(--green)" id="elapsed-${s.id}">${fmtElapsed(elapsed)}</div>
            <div class="floor-card-time" style="color:var(--muted)">IN ${fmtTime(session.clock_in)}</div>
            ${isLate?`<div style="font-size:10px;color:var(--red);margin-top:4px;font-weight:700">⚠ ${late}min LATE</div>`:''}
            <button onclick="S.showConfirmClockOut=true;S.confirmClockOutId='${s.id}';render()" style="background:rgba(255,68,85,.2);border:1px solid rgba(255,68,85,.4);color:var(--red);border-radius:6px;padding:6px 10px;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:1px;margin-top:8px;width:100%">CLOCK OUT</button>
          </div>`;
        }).join('')}
      </div>

      ${offFloor.length>0?`
        <div style="font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:14px 0 10px">○ OFF THE CLOCK (${offFloor.length})</div>
        ${offFloor.map((s,i)=>{
          const todayHrs=sumHours(getTodayEntries(s.id));
          const weekHrs=staffWeekHours[s.id]||0;
          const staffIdx=S.staff.findIndex(st=>st.id===s.id);
          const color=ac(staffIdx>=0?staffIdx:i);
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div class="av" style="background:${color}22;color:${color};opacity:.6">${ai(s.name)}</div>
            <div style="flex:1">
              <div style="font-weight:700;color:var(--muted)">${s.name}</div>
              <div style="font-size:12px;color:var(--muted);text-transform:uppercase">${s.role}</div>
            </div>
            <div style="text-align:right">
              <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)">${fmtHours(todayHrs)} today</div>
              <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--s3)">${fmtHours(weekHrs)} wk</div>
            </div>
            <button onclick="clockIn('${s.id}','${s.name.replace(/'/g,"\\'")}','${S.bar.id}')" style="background:rgba(0,232,122,.15);border:1px solid rgba(0,232,122,.3);color:var(--green);border-radius:6px;padding:8px 10px;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:1px">CLOCK IN</button>
          </div>`;
        }).join('')}
      `:''}
    </div>

    <!-- THIS WEEK SUMMARY -->
    <div class="card">
      <div class="ct">📊 THIS WEEK — ALL STAFF</div>
      ${S.staff.map((s,i)=>{
        const weekMs=staffWeekHours[s.id]||0;
        const todayMs=sumHours(getTodayEntries(s.id));
        const isIn=!!S.clockedInStaff[s.id];
        const color=ac(i);
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="av" style="background:${color}22;color:${color}">${ai(s.name)}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px;color:var(--text)">${s.name}</div>
            <div style="font-size:12px;color:var(--muted);text-transform:uppercase">${s.role}</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Bebas Neue',cursive;font-size:18px;color:${isIn?'var(--green)':'var(--text)'}">${fmtHours(weekMs)}</div>
            <div style="font-size:11px;color:var(--muted)">hrs this week</div>
          </div>
          <span style="display:inline-flex;align-items:center;justify-content:center;width:8px;height:8px;border-radius:50%;background:${isIn?'var(--green)':'var(--border)'};${isIn?'box-shadow:0 0 6px var(--green)':''}"></span>
        </div>`;
      }).join('')}
      ${S.staff.length===0?`<div class="empty-state">No staff added yet.</div>`:''}
    </div>

    <!-- ADD STAFF BUTTON -->
    <button class="action-btn blue" onclick="S.showStaffModal=true;render()">+ ADD STAFF MEMBER</button>

    <!-- TIME HISTORY -->
    <div class="card" style="margin-top:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="ct" style="margin-bottom:0">🕐 TIME HISTORY</div>
        <div style="display:flex;gap:6px">
          ${['today','week','all'].map(v=>`<button onclick="S.clockHistoryView='${v}';render()" style="background:${S.clockHistoryView===v?'var(--lc)':'var(--s2)'};border:1px solid ${S.clockHistoryView===v?'var(--lc)':'var(--border)'};color:${S.clockHistoryView===v?'#fff':'var(--muted)'};border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:1px">${v.toUpperCase()}</button>`).join('')}
        </div>
      </div>
      ${historyEntries.length===0?`<div class="empty-state" style="padding:20px">No time entries yet.</div>`:`
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
          <table class="th-table">
            <thead><tr><th>Staff</th><th>Date</th><th>In</th><th>Out</th><th>Hrs</th><th></th></tr></thead>
            <tbody>
              ${historyEntries.map(e=>{
                const hrs=e.hours_ms?fmtHours(e.hours_ms):(e.clock_out?'--':fmtHours(Date.now()-new Date(e.clock_in).getTime()));
                const isOpen=!e.clock_out;
                return `<tr>

// ─── OWNER SCHEDULE ───────────────────────────────────────────────────────

  return `

      ${DAYS.map((d,i)=>{
        const hasOpen=S.schedules.some(s=>s.day_of_week===i&&s.status==='open');
        return `<button class="day-tab ${S.schedDay===i?'on':''} ${hasOpen&&S.schedDay!==i?'has-open':''}" onclick="S.schedDay=${i};render()">
          <div>${d}</div>${hasOpen?'<div style="font-size:8px;color:var(--red)">OPEN</div>':''}
        </button>`;
      }).join('')}

      const shiftBids=S.bids.filter(b=>b.shift_id===shift.id&&b.status==='pending');

              ${shift.status!=='open'?`<div class="av" style="background:${color}22;color:${color};width:28px;height:28px;font-size:10px">${shift.staff_name?ai(shift.staff_name):'?'}</div>`:''}
              <span class="shift-badge ${shift.status}">${shift.status==='open'?'🔴 OPEN':shift.status==='covered'?'✅ COVERED':shift.staff_name}</span>
              ${isClocked&&shift.staff_id?`<span style="font-size:10px;font-weight:700;color:var(--green);padding:2px 8px;background:rgba(0,232,122,.15);border-radius:10px">● ON CLOCK</span>`:''}

            ${shift.dropped_by?`<div style="font-size:13px;color:var(--red);margin-top:6px">Dropped: ${shift.dropped_by}</div>`:''}

          <div style="display:flex;gap:8px">
            <button class="btn-sm" style="background:rgba(255,68,85,.15);color:var(--red);font-size:18px;padding:6px 12px" onclick="deleteShift('${shift.id}')">×</button>

        ${shift.status==='open'&&S.staff.length>0?`

          </div>

        </div>
      </div>
    </div>`:''}

    ${S.showDropModal?`<div class="modal-bg" onclick="S.showDropModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title">DROP SHIFT</div>

          <div class="field"><label>Prep Time</label><input type="text" value="${S.newRecipe.prep_time}" oninput="S.newRecipe.prep_time=this.value" placeholder="2 min"/></div>
          <div class="field"><label>Cost ($)</label><input type="number" value="${S.newRecipe.cost}" oninput="S.newRecipe.cost=this.value" placeholder="0.00" step="0.01"/></div>
          <div class="field"><label>Sale Price ($)</label><input type="number" value="${S.newRecipe.price}" oninput="S.newRecipe.price=this.value" placeholder="0.00" step="0.01"/></div>
          ${(S.newRecipe.cost&&S.newRecipe.price)?`<div style="background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:center;flex-direction:column"><div style="font-family:'Bebas Neue',cursive;font-size:24px;color:var(--green)">${recipeMargin(parseFloat(S.newRecipe.cost)||0,parseFloat(S.newRecipe.price)||0)}%</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase">Margin</div></div>`:'<div></div>'}
        </div>
        <div style="font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:var(--lcg);margin:10px 0 8px">INGREDIENTS</div>
        ${S.newRecipe.ingredients.map((ing,i)=>`
          <div style="display:grid;grid-template-columns:75px 1fr 30px;gap:6px;margin-bottom:8px;align-items:center">
            <input type="text" value="${ing.amount}" oninput="S.newRecipe.ingredients[${i}].amount=this.value" placeholder="2 oz" style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 8px;font-size:14px;outline:none;font-family:'Share Tech Mono',monospace;width:100%"/>
            <input type="text" value="${ing.name}" oninput="S.newRecipe.ingredients[${i}].name=this.value" placeholder="Ingredient name" style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 10px;font-size:14px;outline:none;font-family:'Rajdhani',sans-serif;width:100%"/>
            <button onclick="removeIngredientRow(${i})" style="background:rgba(255,68,85,.2);border:none;color:var(--red);border-radius:6px;padding:10px;cursor:pointer;font-size:16px">×</button>
          </div>
        `).join('')}
        <button onclick="addIngredientRow()" style="background:var(--s2);border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:10px;cursor:pointer;font-size:14px;font-family:'Bebas Neue',cursive;letter-spacing:1px;width:100%;margin-bottom:14px">+ ADD INGREDIENT</button>
        <div style="font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:2px;color:var(--lcg);margin-bottom:8px">STEPS</div>
        ${S.newRecipe.steps.map((step,i)=>`
          <div style="display:grid;grid-template-columns:28px 1fr 30px;gap:8px;margin-bottom:8px;align-items:center">
            <div style="width:28px;height:28px;border-radius:50%;background:rgba(200,16,46,.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:14px;color:var(--lc);flex-shrink:0">${i+1}</div>
            <input type="text" value="${step}" oninput="S.newRecipe.steps[${i}]=this.value" placeholder="Step ${i+1}..." style="background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 10px;font-size:14px;outline:none;font-family:'Rajdhani',sans-serif;width:100%"/>
            <button onclick="removeStepRow(${i})" style="background:rgba(255,68,85,.2);border:none;color:var(--red);border-radius:6px;padding:10px;cursor:pointer;font-size:16px">×</button>
          </div>
        `).join('')}
        <button onclick="addStepRow()" style="background:var(--s2);border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:10px;cursor:pointer;font-size:14px;font-family:'Bebas Neue',cursive;letter-spacing:1px;width:100%;margin-bottom:6px">+ ADD STEP</button>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="S.showRecipeModal=false;S.editingRecipe=null;render()">Cancel</button>
          <button class="btn-save" onclick="saveRecipe()">${S.editingRecipe?'SAVE CHANGES':'ADD RECIPE'}</button>
        </div>
      </div>
    </div>`;
  }
  return html;
}

init();
</script>
</body>
</html>
